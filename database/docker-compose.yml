version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: salao-da-nyra-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: salao_da_nyra
    ports:
      - "3306:3306"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    networks:
      - salao-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: salao-da-nyra-pma
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - salao-network

volumes:
  mysql_data:

networks:
  salao-network:
    driver: bridge
